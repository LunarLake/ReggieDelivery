spring:
  application:
    name: reggie
  # 本机密码等敏感项写在 application-local.yml（已 gitignore）
  # 复制 application-local.yml.example 为 application-local.yml 后填写
  profiles:
    active: local
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # url / username / password 由 application-local.yml 覆盖

reggie:
  upload:
    path: ./upload/ # 上传文件存储路径，支持绝对路径或相对路径

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
